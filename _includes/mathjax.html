{% unless page.math == false %}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [["\\(", "\\)"], ["$", "$"]],
      displayMath: [
        ["\\[", "\\]"],
        ["$$", "$$"]
      ],
      processEscapes: true,
      tags: "ams"
    },
    chtml: {
      linebreaks: { automatic: true, width: "container" }
    },
    options: {
      skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code", "kbd"]
    }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endunless %}
